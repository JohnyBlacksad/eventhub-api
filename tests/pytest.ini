[pytest]

markers =
    units: Unit tests
    DAO: Data Access Object tests
    users: User related tests
    create_user: Testing user creation logic
    get_user: Testing get user logic
    update_user: Testing update user logic
    delete_user: Testing delete user logic
    update_role: Testing update role user logic
    ban_user: Testing ban user logic
    get_users: Testing get users and filter users list logic


asyncio_mode = auto

pythonpath = .
testpaths = tests

addopts =
    -s
    --cov=app
    --cov-report=term-missing
    --cov-report=html
    --verbose

norecursedirs = .venv .git __pycache__ .pytest_cache