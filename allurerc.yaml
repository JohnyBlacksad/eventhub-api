name: "EventHub API Dashboard"
output: ".tests/report/allure-report"

qualityGate:
  rules:
    - maxFailures: 0
      fastFail: true


plugins:
  awesome:
    options:
      reportName: "EventHub API"
      reportLanguage: "ru"
      groupBy: ["epic", "feature", "story"]

  dashboard:
    options:
      reportName: "Общая статистика"
      reportLanguage: "ru"


variables:
  "Environment": "WSL2 / Ubuntu"
  "Python": "3.12"
  "Layer": "DAO / Services"

